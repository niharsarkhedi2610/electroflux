<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Agent Portal | ElectroFlux</title>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- custom styling -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Floating Ambient background layers -->
  <div class="bg-ambient-layer">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
  </div>

  <div class="dashboard-layout">
    
    <!-- Sidebar / Navigation -->
    <aside class="sidebar glass-panel">
      <div class="sidebar-brand">
        <i class="fas fa-truck-ramp-box"></i> ElectroFlux <span style="font-size:0.75rem; font-weight:700; color:var(--primary); margin-left:4px;">COURIER</span>
      </div>
      
      <nav class="sidebar-menu">
        <a href="#active" class="menu-link active" id="btn-nav-active">
          <i class="fas fa-truck-fast"></i> Active Deliveries
        </a>
        <a href="#completed" class="menu-link" id="btn-nav-completed">
          <i class="fas fa-clipboard-check"></i> Completed Jobs
        </a>
      </nav>

      <div class="sidebar-profile-card">
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="profile-avatar"><i class="fas fa-user-tie"></i></div>
          <div>
            <div class="profile-name">Raj Kumar</div>
            <div class="profile-role">Executive #9021</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Header bar -->
      <header class="content-header glass-panel">
        <h1 class="page-title" id="current-page-title">Active Deliveries</h1>
        <div class="agent-badge">
          <span class="pulse-indicator"></span>
          <span>Online & Active</span>
        </div>
      </header>

      <!-- Stats quick bar -->
      <div class="stat-grid animate-slide-up">
        <div class="stat-card glass-panel">
          <div class="stat-icon-wrap" style="color:var(--warning); background:rgba(251,191,36,0.1);"><i class="fas fa-route"></i></div>
          <div class="stat-info">
            <span class="stat-label">Pending Deliveries</span>
            <h3 class="stat-value" id="stat-pending">0</h3>
          </div>
        </div>
        <div class="stat-card glass-panel">
          <div class="stat-icon-wrap" style="color:var(--success); background:rgba(34,197,94,0.1);"><i class="fas fa-circle-check"></i></div>
          <div class="stat-info">
            <span class="stat-label">Completed Jobs</span>
            <h3 class="stat-value" id="stat-completed">0</h3>
          </div>
        </div>
      </div>

      <!-- VIEW: ACTIVE DELIVERIES -->
      <section id="section-active" class="dashboard-view active">
        <div class="deliveries-list" id="active-deliveries-container">
          <!-- Loading status placeholder -->
          <div class="empty-state">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--primary);"></i>
            <p style="margin-top: 15px; color: var(--text-muted);">Syncing delivery schedule...</p>
          </div>
        </div>
      </section>

      <!-- VIEW: COMPLETED JOBS -->
      <section id="section-completed" class="dashboard-view">
        <div class="deliveries-list" id="completed-deliveries-container">
          <div class="empty-state">
            <i class="fas fa-clipboard-question" style="font-size: 3rem; color: var(--text-muted); opacity: 0.5;"></i>
            <p style="margin-top: 15px; color: var(--text-muted);">No completed deliveries in this session.</p>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- MODAL: SECURITY DETAILS DIALOG -->
  <div id="security-modal" class="modal-overlay">
    <div class="glass-panel modal-card" style="max-width: 440px;">
      <div class="modal-header">
        <h3>🔒 Delivery Security Details</h3>
        <button id="btn-close-security" class="icon-btn"><i class="fas fa-times"></i></button>
      </div>
      <div id="security-details-content" style="display:flex; flex-direction:column; gap:16px; margin-top: 10px;">
        <!-- Filled dynamically -->
      </div>
      <button class="btn btn-secondary" style="width:100%; margin-top:10px;" id="btn-close-security-ok">Close Details</button>
    </div>
  </div>

  <!-- script loader -->
  <script src="js/app.js"></script>
</body>
</html>
